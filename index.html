<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>One.IU — Indiana University</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --crimson:#990000; --crimson-dark:#6e0000; --crimson-soft:#b3272d;
  --cream:#FAF5EC; --cream-dark:#F1E9DA;
  --ink:#231d1a; --muted:#83786f; --line:#eadfce;
  --card:#ffffff; --gold:#F5B841; --gold-soft:#FDEFD2;
  --green:#1E7F4F; --green-soft:#DDF2E6;
  --blue:#2b6cb0; --blue-soft:#DFEBF8;
  --purple:#6b46c1; --purple-soft:#EBE4F9;
  --red-soft:#FBE3E3;
  --body-text:#5c5245; --accent-text:#990000;
  --r-lg:24px; --r-md:16px; --r-sm:10px;
  --shadow:0 6px 24px rgba(60,35,10,.08);
  --shadow-lg:0 16px 48px rgba(60,35,10,.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--cream); color:var(--ink); min-height:100vh;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}

/* ---------- Layout shell ---------- */
.app{display:flex;min-height:100vh}
.sidebar{
  width:232px;flex-shrink:0;position:sticky;top:0;height:100vh;
  background:var(--crimson);color:#fff;display:flex;flex-direction:column;
  padding:22px 14px;z-index:30;
}
.logo{display:flex;align-items:center;gap:11px;padding:4px 10px 22px}
.logo-mark{
  width:42px;height:42px;border-radius:13px;background:#fff;color:var(--crimson);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:19px;letter-spacing:-1px;font-family:Georgia,serif;
}
.logo-mark .trident{height:24px;width:auto;display:block}
.logo-name{font-size:20px;font-weight:800;letter-spacing:-.3px}
.logo-name span{color:var(--gold)}
.nav{display:flex;flex-direction:column;gap:4px;flex:1}
.nav button{
  display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:14px;
  color:rgba(255,255,255,.82);font-size:15px;font-weight:600;text-align:left;
  transition:background .15s;
}
.nav button:hover{background:rgba(255,255,255,.12)}
.nav button.active{background:#fff;color:var(--crimson)}
.nav .ic{font-size:18px;width:22px;text-align:center}
.side-foot{
  margin-top:auto;padding:14px 12px;border-radius:16px;background:rgba(0,0,0,.18);
  font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.85);
}
.side-foot b{color:var(--gold)}
.side-foot button{
  margin-top:9px;width:100%;padding:9px;border-radius:10px;background:#fff;
  color:var(--crimson);font-weight:700;font-size:13px;
}

/* ---------- Main ---------- */
.main{flex:1;min-width:0;padding:26px 30px 110px;max-width:1360px;margin:0 auto;width:100%}
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.greeting h1{font-size:27px;font-weight:800;letter-spacing:-.5px;line-height:1.15}
.greeting p{color:var(--muted);font-size:14.5px;margin-top:3px;font-weight:500}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.search{
  display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--line);
  border-radius:999px;padding:10px 18px;color:var(--muted);font-size:14px;min-width:220px;
  box-shadow:var(--shadow);font-weight:500;
}
.icon-btn{
  width:44px;height:44px;border-radius:999px;background:#fff;border:1.5px solid var(--line);
  font-size:18px;box-shadow:var(--shadow);position:relative;flex-shrink:0;
}
.icon-btn .dot{
  position:absolute;top:9px;right:10px;width:9px;height:9px;border-radius:50%;
  background:var(--crimson-soft);border:2px solid #fff;
}
.avatar{
  width:44px;height:44px;border-radius:999px;background:var(--gold-soft);
  display:flex;align-items:center;justify-content:center;font-size:21px;
  border:2px solid var(--gold);flex-shrink:0;cursor:pointer;
}

/* ---------- Cards grid ---------- */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

/* widget wrappers (customizable layout) */
.widget{position:relative;min-width:0}
.widget.full{grid-column:1/-1}
.widget.wide{grid-column:span 2}   /* 3-col: hero spans 2, search takes the 3rd */
.widget.searchw{grid-column:auto}
.widget>.card,.widget>.hero,.widget>.notice,.widget>.map-wrap{height:100%;box-sizing:border-box}
.w-controls{
  position:absolute;top:-9px;right:-6px;z-index:6;display:flex;gap:5px;
  opacity:0;transition:opacity .15s;
}
.widget:hover .w-controls{opacity:1}
@media (hover:none){.w-controls{opacity:.9}}
.w-controls button{
  width:30px;height:30px;border-radius:999px;background:#fff;border:1.5px solid var(--line);
  box-shadow:var(--shadow);font-size:13px;color:var(--muted);display:flex;align-items:center;
  justify-content:center;font-weight:800;
}
.w-grab{cursor:grab;font-size:15px !important;letter-spacing:-1px}
.w-grab:active{cursor:grabbing}
.w-controls button:hover{border-color:var(--crimson);color:var(--crimson)}
.widget.dragging{opacity:.45}
.widget.drop-target{outline:2.5px dashed var(--crimson);outline-offset:5px;border-radius:26px}
.widget.selected{outline:3px solid var(--gold);outline-offset:5px;border-radius:26px}
.widget.selected .w-grab{background:var(--gold);color:#5b3d00;border-color:var(--gold)}
.layout-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.layout-bar .hint{margin-right:auto;font-size:12.5px;color:var(--muted);font-weight:600}
.lbtn{
  padding:8px 15px;border-radius:999px;background:#fff;border:1.5px solid var(--line);
  font-size:12.5px;font-weight:700;color:var(--ink);box-shadow:var(--shadow);transition:all .12s;
}
.lbtn:hover{border-color:var(--crimson);color:var(--crimson)}
.grid-empty{
  grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-weight:600;
  background:var(--cream-dark);border-radius:24px;border:2px dashed var(--line);
}
.grid-empty button{color:var(--crimson);font-weight:800;text-decoration:underline}
.wp-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px dashed var(--line)}
.wp-row:last-child{border-bottom:none}
.wp-row .wpn{font-weight:700;font-size:14px;flex:1;min-width:0}
.wp-add{
  padding:7px 16px;border-radius:999px;background:var(--crimson);color:#fff;font-weight:800;font-size:12.5px;
}
.card{
  background:var(--card);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow);
  border:1px solid rgba(234,223,206,.6);
}
.span2{grid-column:1/-1}
.card-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:15px}
.card-head h3{font-size:16.5px;font-weight:800;letter-spacing:-.2px;display:flex;gap:8px;align-items:center}
.card-head .link{font-size:13px;font-weight:700;color:var(--crimson);cursor:pointer;flex-shrink:0}

/* hero */
.hero{
  grid-column:1/-1;border-radius:var(--r-lg);padding:26px 28px;color:#fff;
  background:linear-gradient(112deg,var(--crimson) 0%,var(--crimson-soft) 60%,#c94b30 100%);
  box-shadow:var(--shadow-lg);position:relative;overflow:hidden;
}
.hero::after{
  content:"";position:absolute;right:-70px;top:-90px;width:270px;height:270px;border-radius:50%;
  background:rgba(255,255,255,.09);
}
.hero::before{
  content:"";position:absolute;right:60px;bottom:-110px;width:210px;height:210px;border-radius:50%;
  background:rgba(255,255,255,.07);
}
.hero .kicker{
  display:inline-block;background:rgba(255,255,255,.2);border-radius:999px;
  padding:5px 13px;font-size:12px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;margin-bottom:12px;
}
.hero h2{font-size:24px;font-weight:800;letter-spacing:-.4px;max-width:560px;line-height:1.25}
.hero p{margin-top:8px;font-size:15px;opacity:.92;max-width:540px;line-height:1.5;font-weight:500}
.hero-stats{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;position:relative;z-index:1}
.hstat{
  background:rgba(255,255,255,.16);backdrop-filter:blur(4px);border-radius:16px;
  padding:12px 18px;min-width:110px;
}
.hstat .n{font-size:21px;font-weight:800}
.hstat .l{font-size:12px;opacity:.9;font-weight:600;margin-top:2px}

/* schedule */
.sched{display:flex;flex-direction:column;gap:10px}
.sched-item{display:flex;gap:14px;align-items:stretch}
.sched-time{width:66px;flex-shrink:0;text-align:right;padding-top:2px}
.sched-time .t1{font-size:14px;font-weight:800}
.sched-time .t2{font-size:12px;color:var(--muted);font-weight:600}
.sched-body{
  flex:1;border-radius:14px;padding:11px 15px;border-left:4.5px solid var(--crimson);
  background:var(--cream);
}
.sched-body.blue{border-color:var(--blue);}
.sched-body.gold{border-color:var(--gold);}
.sched-body.green{border-color:var(--green);}
.sched-body.purple{border-color:var(--purple);}
.sched-body .st{font-weight:800;font-size:14.5px}
.sched-body .sl{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
.sched-tag{
  float:right;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;
  background:#fff;color:var(--muted);margin-left:8px;
}
.sched-now .sched-body{background:var(--gold-soft)}
.sched-now .sched-tag{background:var(--gold);color:#5b3d00}

/* tasks (to-dos) */
.task{display:flex;align-items:flex-start;gap:12px;padding:11px 4px;border-bottom:1px dashed var(--line)}
.task:last-child{border-bottom:none}
.task .box{
  width:24px;height:24px;border-radius:8px;border:2.5px solid var(--crimson);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:900;
  transition:all .15s;margin-top:1px;
}
.task.done .box{background:var(--green);border-color:var(--green)}
.task .tt{font-weight:700;font-size:14.5px;line-height:1.35}
.task.done .tt{text-decoration:line-through;color:var(--muted)}
.task .td{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
.task .urgent{color:var(--crimson-soft);font-weight:800}
.task{cursor:pointer}

/* balances */
.bal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:12px}
.bal{
  border-radius:16px;padding:14px;background:var(--cream);border:1.5px solid var(--line);
}
.bal .bi{font-size:20px}
.bal .bv{font-size:19px;font-weight:800;margin-top:6px;letter-spacing:-.3px}
.bal .bl{font-size:12px;color:var(--muted);font-weight:700;margin-top:1px}
.bal .bn{font-size:11.5px;color:var(--muted);margin-top:4px}
.bal.alert{background:var(--red-soft);border-color:#f2c4c4}
.bal.alert .bv{color:var(--crimson)}

/* generic list */
.li{display:flex;align-items:center;gap:13px;padding:11px 2px;border-bottom:1px dashed var(--line)}
.li:last-child{border-bottom:none}
.li .lic{
  width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;background:var(--cream);
}
.lic.gold{background:var(--gold-soft)} .lic.green{background:var(--green-soft)}
.lic.blue{background:var(--blue-soft)} .lic.purple{background:var(--purple-soft)}
.lic.red{background:var(--red-soft)}
.li .lit{font-weight:700;font-size:14.5px;line-height:1.3}
.li .lis{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px;line-height:1.4}
.li .lir{margin-left:auto;text-align:right;flex-shrink:0;padding-left:10px}
.li .lirt{font-weight:800;font-size:14px}
.li .lirs{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
.badge{
  display:inline-block;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;
}
.badge.green{background:var(--green-soft);color:var(--green)}
.badge.gold{background:var(--gold-soft);color:#8a5a00}
.badge.red{background:var(--red-soft);color:var(--crimson)}
.badge.blue{background:var(--blue-soft);color:var(--blue)}
.badge.gray{background:var(--cream-dark);color:var(--muted)}

/* quick-launch tiles */
.qa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:11px}
.qa{
  border-radius:16px;padding:14px 8px;background:var(--cream);border:1.5px solid var(--line);
  display:flex;flex-direction:column;align-items:center;gap:8px;font-weight:700;font-size:12.5px;
  text-align:center;transition:transform .12s, box-shadow .12s;color:var(--ink);
}
.qa:hover{transform:translateY(-2px);box-shadow:var(--shadow);background:#fff}
.qa .qi{
  width:40px;height:40px;border-radius:12px;background:#fff;display:flex;align-items:center;
  justify-content:center;font-size:19px;box-shadow:0 2px 8px rgba(60,35,10,.09);
}

/* task launcher (One.IU tasks) */
.tsearch{
  width:100%;padding:13px 18px;border-radius:14px;border:1.5px solid var(--line);
  background:var(--cream);font:inherit;font-size:14.5px;font-weight:600;margin-bottom:13px;outline:none;
  color:var(--ink);
}
.tsearch::placeholder{color:var(--muted)}
.tsearch:focus{border-color:var(--crimson);background:#fff}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{
  padding:7px 14px;border-radius:999px;background:var(--cream);border:1.5px solid var(--line);
  font-size:12.5px;font-weight:700;color:var(--muted);transition:all .12s;
}
.chip:hover{border-color:var(--crimson);color:var(--crimson)}
.chip.active{background:var(--crimson);border-color:var(--crimson);color:#fff}
.star{
  font-size:19px;color:#d9cdb6;padding:6px 4px;flex-shrink:0;transition:transform .12s;line-height:1;
}
.star:hover{transform:scale(1.15)}
.star.on{color:var(--gold)}
.cat-tag{font-size:11px;font-weight:800;color:var(--muted);background:var(--cream-dark);padding:3px 9px;border-radius:999px}
.pop-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.pop-chip{
  display:inline-flex;gap:7px;align-items:center;padding:8px 14px;border-radius:999px;
  background:var(--cream);border:1.5px solid var(--line);font-size:12.5px;font-weight:700;
  transition:all .12s;color:var(--ink);
}
.pop-chip:hover{border-color:var(--crimson);background:#fff}
.launch-divider{
  font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);
  margin:16px 0 8px;
}
.empty{padding:26px 10px;text-align:center;color:var(--muted);font-weight:600;font-size:14px}

/* campus map */
.map-wrap{grid-column:1/-1}
.map-topbar{display:flex;gap:10px;flex-wrap:wrap}
.msearch{
  flex:1;min-width:200px;padding:12px 20px;border-radius:999px;border:1.5px solid var(--line);
  background:#fff;font:inherit;font-size:14.5px;font-weight:600;outline:none;box-shadow:var(--shadow);
  color:var(--ink);
}
.msearch::placeholder{color:var(--muted)}
.msearch:focus{border-color:var(--crimson)}
.campus-pill{
  padding:12px 20px;border-radius:999px;background:var(--crimson);color:#fff;font-weight:800;
  font-size:14px;box-shadow:var(--shadow);flex-shrink:0;
}
.map-chips{display:flex;gap:8px;overflow-x:auto;padding:12px 2px;scrollbar-width:none}
.map-chips::-webkit-scrollbar{display:none}
.mchip{
  white-space:nowrap;display:inline-flex;gap:7px;align-items:center;padding:9px 16px;border-radius:999px;
  background:#fff;border:1.5px solid var(--line);font-size:13px;font-weight:700;color:var(--ink);
  box-shadow:var(--shadow);transition:all .12s;flex-shrink:0;
}
.mchip:hover{border-color:var(--crimson)}
.mchip.active{background:var(--crimson);border-color:var(--crimson);color:#fff}
.map-box{
  height:420px;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);
  border:1px solid var(--line);position:relative;z-index:1;background:var(--cream-dark);
}
.map-note{font-size:12px;color:var(--muted);font-weight:600;margin-top:9px}
.pdot{
  width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;
}
.pdot.building{background:var(--gold-soft)} .pdot.parking{background:var(--purple-soft)}
.pdot.bus{background:var(--blue-soft)} .pdot.food{background:var(--red-soft)}
.permit{
  display:inline-block;font-size:11px;font-weight:800;border:1.5px solid var(--line);
  border-radius:999px;padding:3px 9px;color:var(--muted);margin-right:4px;
}
.dhead-dist{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:4px}
.dhead-addr{font-size:13.5px;color:var(--muted);font-weight:600;margin-top:4px}
.getthere{
  display:inline-flex;gap:8px;align-items:center;background:var(--crimson);color:#fff;border-radius:999px;
  padding:11px 20px;font-weight:800;font-size:13.5px;text-decoration:none;margin-top:16px;
}
.dsec{margin-top:20px;border-top:1px dashed var(--line);padding-top:14px}
.dsec h4{
  font-size:11.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);
  font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px;
}
.dsec .drow{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:14px;font-weight:700}
.dsec .drow .sub{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
.dsec .drow .right{margin-left:auto;flex-shrink:0}
.abbr-chip{
  float:right;font-size:15px;font-weight:900;color:var(--muted);letter-spacing:.5px;
  background:var(--cream);border-radius:10px;padding:6px 12px;
}
@media (max-width:768px){ .map-box{height:340px} }

/* action items widget */
.ai-head{display:flex;align-items:center;gap:10px}
.ai-head .w-title{font-size:17px;font-weight:800;letter-spacing:-.2px}
.count-badge{background:var(--crimson);color:#fff;font-size:12px;font-weight:800;border-radius:999px;padding:3px 10px;min-width:24px;text-align:center}
.ai-sub{color:var(--muted);font-size:13px;font-weight:600;margin-top:5px;line-height:1.5}
.explainer-toggle{margin-top:10px;font-size:12.5px;font-weight:700;color:var(--blue);display:inline-flex;gap:5px;align-items:center}
.explainer{margin-top:10px;background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:13px 14px;font-size:12.5px;color:var(--body-text);font-weight:600;line-height:1.55;display:none}
.explainer.open{display:block}
.explainer b{color:var(--ink)}
.model-row{display:flex;gap:9px;align-items:flex-start;margin-top:9px}
.model-key{flex-shrink:0;font-size:15px;width:22px;text-align:center}
.ai-add{margin-left:auto;font-size:12px;font-weight:800;color:var(--crimson);border:1.5px solid var(--line);border-radius:999px;padding:6px 12px;flex-shrink:0}
.ai-add:hover{border-color:var(--crimson);background:var(--red-soft)}
.ai-compose{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px;padding:12px;border:1.5px dashed var(--line);border-radius:14px;background:var(--cream)}
.ai-rem-input{flex:1;min-width:150px;padding:10px 13px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font:inherit;font-size:13.5px;font-weight:600;outline:none;color:var(--ink)}
.ai-rem-input:focus{border-color:var(--crimson)}
.ai-chips{display:flex;gap:8px;flex-wrap:wrap;margin:13px 0 4px}
.ai-items{margin-top:8px;max-height:340px;overflow-y:auto;padding-right:6px}
.ai-items::-webkit-scrollbar{width:8px}
.ai-items::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.ai-grid{display:flex;flex-direction:column;gap:12px}   /* each item = full widget width */
.item{border:1px solid var(--line);border-radius:16px;padding:14px 15px;background:#fff;transition:opacity .2s}
.item.high{border-left:5px solid var(--crimson-soft)}
.item.resolved{opacity:.6}
.item.resolved .it-title{color:var(--muted)}
.it-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.src-chip{display:inline-flex;gap:6px;align-items:center;font-size:11px;font-weight:800;border-radius:999px;padding:4px 10px 4px 5px}
.src-ic{width:19px;height:19px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px}
.src-chip.blue{background:var(--blue-soft);color:var(--blue)} .src-chip.blue .src-ic{background:#fff}
.src-chip.green{background:var(--green-soft);color:var(--green)} .src-chip.green .src-ic{background:#fff}
.src-chip.gold{background:var(--gold-soft);color:#8a5a00} .src-chip.gold .src-ic{background:#fff}
.src-chip.purple{background:var(--purple-soft);color:var(--purple)} .src-chip.purple .src-ic{background:#fff}
.src-chip.red{background:var(--red-soft);color:var(--crimson)} .src-chip.red .src-ic{background:#fff}
.model{display:inline-flex;gap:4px;align-items:center;font-size:10.5px;font-weight:800;border-radius:999px;padding:3px 8px;border:1.5px solid var(--line);color:var(--muted);background:#fff}
.model.approve{color:var(--blue);border-color:var(--blue-soft);background:var(--blue-soft)}
.model.self{color:var(--purple);border-color:var(--purple-soft);background:var(--purple-soft)}
.due{margin-left:auto;font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;background:var(--cream);color:var(--muted);flex-shrink:0}
.due.high{background:var(--red-soft);color:var(--crimson)}
.it-title{font-weight:800;font-size:14.5px;line-height:1.3}
.it-desc{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:3px;line-height:1.45}
.status{display:flex;gap:7px;align-items:flex-start;margin-top:10px;border-radius:11px;padding:8px 10px;font-size:12px;font-weight:700;line-height:1.4}
.status .si{flex-shrink:0}
.status.wait{background:var(--gold-soft);color:#8a5a00}
.status.approve{background:var(--blue-soft);color:var(--blue)}
.status.doneS{background:var(--green-soft);color:var(--green)}
.status.self{background:var(--purple-soft);color:var(--purple)}
.it-actions{display:flex;gap:7px;align-items:center;margin-top:12px;flex-wrap:wrap}
.act{display:inline-flex;gap:6px;align-items:center;background:var(--crimson);color:#fff;border-radius:999px;padding:8px 15px;font-weight:800;font-size:12px}
.act:hover{background:var(--crimson-soft)}
.act.ghost{background:var(--cream);color:var(--ink);border:1.5px solid var(--line)}
.act.ghost:hover{border-color:var(--green);color:var(--green)}
.dismiss{margin-left:auto;font-size:11.5px;font-weight:800;color:var(--muted);padding:7px 9px;border-radius:10px;display:inline-flex;gap:5px;align-items:center}
.dismiss:hover{color:var(--crimson);background:var(--red-soft)}
.sim{width:100%;margin-top:9px;font-size:10.5px;font-weight:700;color:var(--muted);border:1px dashed var(--line);border-radius:10px;padding:6px 10px;background:repeating-linear-gradient(45deg,#fff,#fff 8px,var(--cream) 8px,var(--cream) 16px)}
.sim:hover{border-color:var(--gold);color:#8a5a00}
.ai-foot{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;color:var(--muted);flex-wrap:wrap}
.ai-foot .restore{color:var(--blue);cursor:pointer}
.ai-foot .sync{margin-left:auto;display:inline-flex;gap:6px;align-items:center}

/* omni-search widget */
.omni{display:flex;flex-direction:column;height:100%}
.omni h3{font-size:16.5px;font-weight:800;letter-spacing:-.2px;display:flex;gap:8px;align-items:center;margin-bottom:12px}
.omni-input{width:100%;padding:12px 16px;border-radius:14px;border:1.5px solid var(--line);background:var(--cream);font:inherit;font-size:14px;font-weight:600;outline:none;color:var(--ink)}
.omni-input::placeholder{color:var(--muted)}
.omni-input:focus{border-color:var(--crimson);background:#fff}
.omni-scope{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:8px;line-height:1.4}
.omni-results{margin-top:12px;height:300px;overflow-y:auto;border-top:1px dashed var(--line);padding-top:6px}
.omni-results::-webkit-scrollbar{width:8px}
.omni-results::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.ores{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px dashed var(--line);cursor:pointer;border-radius:10px}
.ores:hover{background:var(--cream)}
.ores:last-child{border-bottom:none}
.ores .oic{width:34px;height:34px;border-radius:10px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ores .ot{font-weight:700;font-size:13.5px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ores .os{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ores .otag{margin-left:auto;flex-shrink:0;font-size:10px;font-weight:800;color:var(--muted);background:var(--cream-dark);border-radius:999px;padding:3px 8px;text-transform:uppercase;letter-spacing:.3px}
.omni-empty{padding:30px 12px;text-align:center;color:var(--muted);font-weight:600;font-size:13px;line-height:1.6}
.omni-group{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:12px 4px 4px;position:sticky;top:0;background:#fff}
.omni-group:first-child{margin-top:2px}
@media (max-width:768px){ .omni-results{height:auto;max-height:340px} }

/* search bar (above widgets) */
.omnibar{position:relative;display:flex;align-items:center;gap:11px;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:14px 18px;box-shadow:var(--shadow);margin-bottom:18px}
.omnibar:focus-within{border-color:var(--crimson)}
.omnibar-ic{font-size:18px;color:var(--muted);flex-shrink:0}
.omnibar-input{flex:1;min-width:0;border:none;outline:none;background:none;font:inherit;font-size:16px;font-weight:600;color:var(--ink)}
.omnibar-input::placeholder{color:var(--muted);font-weight:600}
.omnibar-clear{width:26px;height:26px;border-radius:999px;background:var(--cream);color:var(--muted);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.omnibar-clear:hover{color:var(--crimson);background:var(--red-soft)}
.omnibar-results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);max-height:400px;overflow-y:auto;z-index:25;padding:6px 12px}
.omnibar-results::-webkit-scrollbar{width:8px}
.omnibar-results::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

/* Profile & settings */
.set-profile{display:flex;align-items:center;gap:14px;background:var(--cream);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:6px}
.set-av{width:52px;height:52px;border-radius:15px;background:var(--gold-soft);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.set-name{font-weight:800;font-size:16px}
.set-role{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
.set-row{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px dashed var(--line)}
.set-row:last-child{border-bottom:none}
.set-row .si{width:38px;height:38px;border-radius:11px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.set-row .st{font-weight:700;font-size:14px;line-height:1.25}
.set-row .ss{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.set-right{margin-left:auto;flex-shrink:0;color:var(--muted);font-weight:800;font-size:16px;display:flex;align-items:center}
.switch{width:46px;height:28px;border-radius:999px;background:var(--line);position:relative;transition:background .15s;flex-shrink:0;border:0;cursor:pointer}
.switch.on{background:var(--green)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.35)}
.switch.on::after{left:21px}

/* Sign-in CTA (guest) */
.signin-card{display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  background:linear-gradient(112deg,var(--crimson) 0%,var(--crimson-soft) 60%,#c94b30 100%);
  color:#fff;border:none}
.signin-ic{font-size:34px;flex-shrink:0}
.signin-body{flex:1;min-width:200px}
.signin-t{font-size:18px;font-weight:800;letter-spacing:-.2px}
.signin-s{font-size:13.5px;opacity:.92;font-weight:500;margin-top:4px;line-height:1.5}
.signin-actions{flex-shrink:0;text-align:center}
.signin-btn{background:#fff;color:var(--crimson);font-weight:800;font-size:14px;border-radius:12px;padding:13px 20px;box-shadow:var(--shadow)}
.signin-btn:hover{background:var(--cream)}
.signin-alt{font-size:12.5px;opacity:.95;font-weight:600;margin-top:9px}
.signin-alt .link{color:var(--gold);cursor:pointer}

/* Campus feed */
.seg{display:flex;background:var(--cream);border:1.5px solid var(--line);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px}
.seg button{flex:1;padding:9px 6px;border-radius:9px;font-weight:800;font-size:13px;color:var(--muted);transition:all .12s}
.seg button.active{background:#fff;color:var(--crimson);box-shadow:var(--shadow)}
.feed-filter{display:flex;gap:8px;flex-wrap:wrap;margin:-2px 0 12px}
.feed-list{max-height:360px;overflow-y:auto;padding-right:5px}
.feed-list::-webkit-scrollbar{width:8px}.feed-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.feed-item{display:flex;gap:13px;border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:10px;cursor:pointer;background:#fff;transition:border-color .12s}
.feed-item:hover{border-color:var(--crimson)}
.feed-date{width:80px;flex-shrink:0;border-right:1px solid var(--line);padding-right:12px}
.feed-date .fd1{font-weight:800;font-size:14px}
.feed-date .fd2{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px}
.feed-title{font-weight:800;font-size:14.5px;line-height:1.3}
.feed-sub{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:3px}
.feed-cat{font-size:12px;font-weight:800;color:var(--blue);margin-bottom:5px}
.feed-src{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:8px;text-align:right}
.game{border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;cursor:pointer;background:#fff;transition:border-color .12s}
.game:hover{border-color:var(--crimson)}
.game-date{font-size:13px;font-weight:800;margin-bottom:7px}
.game-top{display:flex;justify-content:space-between;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.team{display:flex;align-items:center;gap:10px;padding:4px 0;font-weight:800;font-size:14.5px}
.team .logo{width:28px;height:28px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:15px;border:1px solid var(--line);flex-shrink:0}
.team .logo .trident{height:16px;width:auto;color:var(--crimson)}
.team .ha{margin-left:auto;font-size:10px;font-weight:800;color:var(--muted);background:var(--cream);border:1px solid var(--line);border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center}

/* CrimsonCard visual */
.cc-card{border-radius:16px;padding:16px 18px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow);
  background:linear-gradient(135deg,var(--crimson-dark),var(--crimson) 55%,#c94b30)}
.cc-card::after{content:"";position:absolute;right:-46px;top:-46px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.09)}
.cc-card::before{content:"";position:absolute;right:26px;bottom:-60px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.06)}
.cc-top{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:13px;letter-spacing:.3px;position:relative;z-index:1}
.cc-iu{background:#fff;color:var(--crimson);border-radius:7px;padding:4px 7px;display:inline-flex;align-items:center}
.cc-iu .trident{height:16px;width:auto;display:block}
.cc-photo{width:50px;height:50px;border-radius:12px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:26px;margin:14px 0 10px;position:relative;z-index:1}
.cc-name{font-weight:800;font-size:16px;position:relative;z-index:1}
.cc-kind{font-size:12px;opacity:.85;font-weight:600;margin-top:1px;position:relative;z-index:1}
.cc-id{font-family:ui-monospace,Menlo,monospace;font-size:13px;letter-spacing:1.5px;margin-top:12px;opacity:.95;position:relative;z-index:1}
.cc-card.lg{padding:22px 22px 24px}
.cc-card.lg .cc-photo{width:62px;height:62px;font-size:32px}
.cc-card.lg .cc-name{font-size:19px}
.cc-manage{width:100%;margin-top:12px;padding:11px;border-radius:12px;background:var(--cream);border:1.5px solid var(--line);font-weight:800;font-size:13px;color:var(--crimson)}
.cc-manage:hover{background:#fff;border-color:var(--crimson)}
.cc-hint{font-size:12px;color:var(--muted);font-weight:600;margin-top:9px;text-align:center}
.pill-btn{font-size:11.5px;font-weight:800;padding:5px 12px;border-radius:999px;background:var(--crimson);color:#fff}
.pill-btn:hover{background:var(--crimson-soft)}
.lib-search{width:100%;padding:11px 15px;border-radius:12px;border:1.5px solid var(--line);background:var(--cream);font:inherit;font-size:14px;font-weight:600;outline:none;color:var(--ink);margin-bottom:12px}
.lib-search::placeholder{color:var(--muted)}
.lib-search:focus{border-color:var(--crimson);background:#fff}

/* progress */
.prog-label{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:8px}
.prog-label span:last-child{color:var(--crimson)}
.prog-bar{height:14px;border-radius:999px;background:var(--cream-dark);overflow:hidden}
.prog-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,var(--crimson),var(--crimson-soft) 70%,var(--gold));
}
.prog-note{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:9px;line-height:1.5}

/* steps tracker */
.step{display:flex;gap:14px}
.step .rail{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0}
.step .knob{
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;flex-shrink:0;
}
.step .wire{width:3px;flex:1;background:var(--line);min-height:14px;border-radius:2px}
.step.done .knob{background:var(--green);color:#fff}
.step.done .wire{background:var(--green)}
.step.now .knob{background:var(--gold);color:#5b3d00;box-shadow:0 0 0 5px var(--gold-soft)}
.step.todo .knob{background:var(--cream-dark);color:var(--muted)}
.step .sbody{padding:3px 0 18px}
.step:last-child .sbody{padding-bottom:4px}
.step .stt{font-weight:800;font-size:14.5px}
.step.todo .stt{color:var(--muted)}
.step .sts{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px;line-height:1.45}

/* notice */
.notice{display:flex;gap:14px;align-items:flex-start;border-radius:var(--r-lg);padding:18px 20px}
.notice.gold{background:var(--gold-soft);border:1.5px solid #f0d9a4}
.notice.green{background:var(--green-soft);border:1.5px solid #bfe4cd}
.notice.blue{background:var(--blue-soft);border:1.5px solid #c2d8ef}
.notice .ni{font-size:24px}
.notice .nt{font-weight:800;font-size:14.5px}
.notice .ns{font-size:13px;color:var(--body-text);font-weight:600;margin-top:3px;line-height:1.5}

/* ---------- Bottom nav (mobile) ---------- */
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;z-index:40;
  border-top:1.5px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 30px rgba(60,35,10,.1);
}
.bottom-nav .bn-inner{display:flex;justify-content:space-around;max-width:560px;margin:0 auto}
.bottom-nav button{
  display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;
  color:var(--muted);padding:5px 6px;border-radius:12px;min-width:50px;
}
.bottom-nav button.active{color:var(--crimson)}
.bottom-nav button.active .bic{background:var(--crimson);color:#fff}
.bottom-nav .bic{
  width:34px;height:25px;border-radius:999px;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .15s;
}

/* ---------- Overlays ---------- */
.scrim{
  position:fixed;inset:0;background:rgba(35,25,15,.45);z-index:60;opacity:0;pointer-events:none;
  transition:opacity .2s;backdrop-filter:blur(2px);
}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:-420px;width:min(400px,92vw);height:100vh;background:#fff;z-index:70;
  transition:right .25s cubic-bezier(.3,.8,.4,1);padding:24px 22px calc(24px + env(safe-area-inset-bottom));
  overflow-y:auto;box-shadow:var(--shadow-lg);
}
.drawer.open{right:0}
.drawer h2{font-size:20px;font-weight:800;margin-bottom:4px}
.drawer .dsub{color:var(--muted);font-size:13.5px;font-weight:600;margin-bottom:18px}
.drawer .close{
  position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:999px;
  background:var(--cream);font-size:15px;font-weight:800;
}
.notif{
  display:flex;gap:12px;padding:13px 4px;border-bottom:1px dashed var(--line);align-items:flex-start;
}
.notif .nic{width:38px;height:38px;border-radius:12px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.notif .nt{font-weight:700;font-size:13.5px;line-height:1.35}
.notif .ns{font-size:12px;color:var(--muted);font-weight:600;margin-top:3px;line-height:1.45}
.notif .ntime{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600}
.notif.unread .nt::before{content:"● ";color:var(--crimson-soft);font-size:10px}

/* ---------- Admin ---------- */
.admin-fab{
  position:fixed;bottom:22px;right:22px;z-index:50;background:var(--ink);color:#fff;
  border-radius:999px;padding:13px 20px;font-weight:800;font-size:13.5px;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:8px;transition:transform .12s;
}
.admin-fab:hover{transform:scale(1.04)}
.admin-modal{
  position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:20px;
}
.admin-modal.open{display:flex}
.admin-box{
  background:var(--cream);border-radius:28px;max-width:860px;width:100%;max-height:88vh;overflow-y:auto;
  padding:30px;box-shadow:var(--shadow-lg);position:relative;
}
.admin-box h2{font-size:23px;font-weight:800;letter-spacing:-.4px}
.admin-box .asub{color:var(--muted);font-size:14px;font-weight:600;margin:5px 0 20px;line-height:1.5}
.admin-box .close{
  position:absolute;top:20px;right:20px;width:38px;height:38px;border-radius:999px;background:#fff;
  font-size:15px;font-weight:800;box-shadow:var(--shadow);
}
.persona-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,220px),1fr));gap:14px}
.pcard{
  background:#fff;border-radius:20px;padding:18px;text-align:left;border:2.5px solid transparent;
  box-shadow:var(--shadow);transition:all .15s;display:flex;flex-direction:column;gap:4px;
}
.pcard:hover{transform:translateY(-2px)}
.pcard.sel{border-color:var(--crimson)}
.pcard .pav{
  width:52px;height:52px;border-radius:16px;background:var(--cream);display:flex;align-items:center;
  justify-content:center;font-size:27px;margin-bottom:8px;
}
.pcard .pn{font-weight:800;font-size:15.5px}
.pcard .pr{font-size:12px;font-weight:800;color:var(--crimson);text-transform:uppercase;letter-spacing:.5px}
.pcard .pd{font-size:12.5px;color:var(--muted);font-weight:600;line-height:1.45;margin-top:4px}
.pcard .sel-tag{
  margin-top:10px;font-size:11.5px;font-weight:800;color:var(--green);display:none;
}
.pcard.sel .sel-tag{display:block}

/* toast */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);z-index:90;
  background:var(--ink);color:#fff;border-radius:14px;padding:12px 20px;font-size:13.5px;font-weight:700;
  opacity:0;pointer-events:none;transition:all .25s;max-width:88vw;text-align:center;box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* page transition */
.main-inner{animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- Responsive ---------- */
@media (max-width:1250px){
  .grid{grid-template-columns:repeat(2,1fr)}
  /* below 3 columns, hero + search stop spanning and stack full-width */
  .widget.wide, .widget.searchw{grid-column:1/-1}
}
@media (max-width:960px){
  .grid{grid-template-columns:1fr}
  .widget.wide, .widget.searchw, .widget.full{grid-column:1/-1}
  .search{display:none}
}
@media (max-width:768px){
  .sidebar{display:none}
  .bottom-nav{display:block}
  .main{padding:20px 16px 130px}
  .greeting h1{font-size:23px}
  .hero{padding:22px 20px}
  .hero h2{font-size:20px}
  .admin-fab{bottom:88px;right:14px;padding:11px 16px}
  .card{padding:18px}
}

function allMapPlaces(){
  const out = [...PLACES];
  for(const b of PLACES.filter(p=>p.type==="building" && p.food)){
    b.food.forEach((f,i)=>out.push({
      id:`${b.id}_food${i}`, type:"food", name:f.name, addr:`${b.name} · ${f.floor}`,
      lat:b.lat, lng:b.lng, hours:f.hours, days:f.days, services:f.services, parent:b.id
    }));
  }
  return out;
}
function distMi(a,b){
  const R=3958.8, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLng=toR(b.lng-a.lng);
  const h=Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function distLabel(p){
  const d = distMi(USER_LOC,p);
  return d < 0.19 ? `${Math.round(d*5280/10)*10} feet away` : `${d.toFixed(1)} miles away`;
}
function isOpen(hours){ const h=new Date().getHours(); return h>=hours[0] && h<hours[1]; }
function hr12(h){ const ap=h>=12?"p.m.":"a.m."; const x=h%12||12; return `${x} ${ap}`; }
function openBadge(p){
  const o = isOpen(p.hours);
  return `<span class="badge ${o?"green":"red"}">${o?"Open":"Closed"}</span>`;
}
function nearestStops(p,n=2){
  return PLACES.filter(x=>x.type==="bus" && x.id!==p.id)
    .map(s=>({s,d:distMi(p,s)})).sort((a,b)=>a.d-b.d).slice(0,n);
}
function visiblePlaces(){
  const q = state.mapQ.trim().toLowerCase();
  const list = allMapPlaces();
  if(q) return list.filter(p=>(p.name+" "+(p.addr||"")).toLowerCase().includes(q))
                   .sort((a,b)=>distMi(USER_LOC,a)-distMi(USER_LOC,b));
  const t = {buildings:"building", buses:"bus", parking:"parking", food:"food"}[state.mapFilter];
  return list.filter(p=>p.type===t).sort((a,b)=>distMi(USER_LOC,a)-distMi(USER_LOC,b));
}

function greeting(){
  const h = new Date().getHours();
  return h<12 ? "Good morning" : h<17 ? "Good afternoon" : "Good evening";
}
function todayStr(){
  return new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
}

/* ---------- task-catalog helpers ---------- */
function taskById(id){ return TASKS.find(t=>t.id===id); }
function personaTasks(){
  // Guests browse the full One.IU catalog (like one.iu.edu when signed out)
  if(P().guest) return TASKS.slice();
  return TASKS.filter(t=>t.personas.includes("all")||t.personas.includes(state.persona));
}
function taskCategories(){
  return ["All",...new Set(personaTasks().map(t=>t.cat))];
}
function launchTask(id){
  const t = taskById(id);
  if(P().guest && !t.personas.includes("all")){
    toast(`Sign in with your IU username to use “${t.name}”.`); return;
  }
  toast(`"${t.name}" opens the One.IU task — not connected in this prototype.`);
}
function toggleFav(ev,id){
  ev.stopPropagation();
  state.favs.has(id) ? state.favs.delete(id) : state.favs.add(id);
  if(state.tab==="tasks"){ refreshTaskResults(); } else { renderMain(); }
}

/* ---------- card renderers ---------- */
function esc(s){return String(s??"")}

function renderCard(c){
  switch(c.type){
    case "hero": return `
      <div class="hero">
        <span class="kicker">${esc(c.kicker)}</span>
        <h2>${esc(c.title)}</h2>
        <p>${esc(c.sub)}</p>
        <div class="hero-stats">${c.stats.map(s=>`<div class="hstat"><div class="n">${esc(s.n)}</div><div class="l">${esc(s.l)}</div></div>`).join("")}</div>
      </div>`;
    case "schedule": return card(c.title, `<div class="sched">${c.items.map(i=>`
      <div class="sched-item ${i.now?"sched-now":""}">
        <div class="sched-time"><div class="t1">${esc(i.t1)}</div><div class="t2">${esc(i.t2)}</div></div>
        <div class="sched-body ${esc(i.color||"")}">
          ${i.tag?`<span class="sched-tag">${esc(i.tag)}</span>`:""}
          <div class="st">${esc(i.title)}</div><div class="sl">${esc(i.loc)}</div>
        </div>
      </div>`).join("")}</div>`);
    case "tasks": return card(c.title, c.items.map(i=>{
      const done = !!state.checked[i.id];
      return `<div class="task ${done?"done":""}" onclick="toggleTask('${i.id}')">
        <div class="box">${done?"✓":""}</div>
        <div><div class="tt">${esc(i.txt)}</div><div class="td ${i.urgent?"urgent":""}">${esc(i.due)}</div></div>
      </div>`;}).join(""));
    case "balances": return card(c.title, `<div class="bal-grid">${c.items.map(i=>`
      <div class="bal ${i.alert?"alert":""}"><div class="bi">${esc(i.icon)}</div>
        <div class="bv">${esc(i.value)}</div><div class="bl">${esc(i.label)}</div><div class="bn">${esc(i.note)}</div>
      </div>`).join("")}</div>`);
    case "list": return card(c.title, c.items.map(i=>`
      <div class="li">
        <div class="lic ${esc(i.bg||"")}">${esc(i.icon)}</div>
        <div style="min-width:0"><div class="lit">${esc(i.title)}</div><div class="lis">${esc(i.sub)}</div></div>
        <div class="lir">
          ${i.badge?`<span class="badge ${esc(i.badge.cls)}">${esc(i.badge.txt)}</span>`:""}
          ${i.right?`<div class="lirt">${esc(i.right)}</div>`:""}
          ${i.rightSub?`<div class="lirs">${esc(i.rightSub)}</div>`:""}
        </div>
      </div>`).join(""));
    case "launch": return renderLaunchCard();
    case "tasklauncher": return renderTaskLauncher();
    case "campusmap": return renderCampusMap();
    case "actionitems": return renderActionItems();
    case "crimsoncard": return renderCrimsonCard();
    case "orgs": return renderOrgs();
    case "libraries": return renderLibraries();
    case "campusfeed": return renderCampusFeed();
    case "signin": return renderSignin();
    case "progress": return card(c.title, `
      <div class="prog-label"><span>${esc(c.label)}</span><span>${c.pct}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${c.pct}%"></div></div>
      <div class="prog-note">${esc(c.note)}</div>`);
    case "steps": return card(c.title, c.items.map((s,i)=>`
      <div class="step ${s.state}">
        <div class="rail"><div class="knob">${s.state==="done"?"✓":i+1}</div>${i<c.items.length-1?'<div class="wire"></div>':""}</div>
        <div class="sbody"><div class="stt">${esc(s.title)}</div><div class="sts">${esc(s.sub)}</div></div>
      </div>`).join(""));
    case "notice": return `
      <div class="notice ${esc(c.tone)}"><div class="ni">${esc(c.icon)}</div>
        <div><div class="nt">${esc(c.title)}</div><div class="ns">${esc(c.sub)}</div></div>
      </div>`;
  }
  return "";
}
function card(title, body, extraClass="", headLink=""){
  return `<div class="card ${extraClass}"><div class="card-head"><h3>${title}</h3>${headLink}</div>${body}</div>`;
}

/* Favorites + popular tasks (home) */
function renderLaunchCard(){
  if(P().guest){
    const pop = personaTasks().filter(t=>t.popular).slice(0,8);
    const popHtml = `<div class="qa-grid">${pop.map(t=>`
      <button class="qa" onclick="launchTask('${t.id}')"><div class="qi">${t.icon}</div>${esc(t.name)}</button>`).join("")}</div>`;
    return card("🔥 Popular on One.IU", popHtml, "span2",
      `<span class="link" onclick="setTab('tasks')">All tasks →</span>`);
  }
  const favs = [...state.favs].map(taskById).filter(Boolean);
  const favHtml = favs.length
    ? `<div class="qa-grid">${favs.slice(0,8).map(t=>`
        <button class="qa" onclick="launchTask('${t.id}')"><div class="qi">${t.icon}</div>${esc(t.name)}</button>`).join("")}</div>`
    : `<div class="empty">No favorites yet. Star tasks in the Tasks tab to pin them here.</div>`;
  const pop = personaTasks().filter(t=>t.popular && !state.favs.has(t.id)).slice(0,5);
  const popHtml = pop.length
    ? `<div class="launch-divider">Popular on One.IU</div>
       <div class="pop-row">${pop.map(t=>`
         <button class="pop-chip" onclick="launchTask('${t.id}')">${t.icon} ${esc(t.name)}</button>`).join("")}</div>`
    : "";
  return card("⭐ Favorite tasks", favHtml + popHtml, "span2",
    `<span class="link" onclick="setTab('tasks')">All tasks →</span>`);
}

/* Full searchable One.IU task directory */
function renderTaskLauncher(){
  const cats = taskCategories();
  return `<div class="card span2">
    <div class="card-head"><h3>⊞ One.IU tasks</h3>
      <span class="link" style="cursor:default;color:var(--muted)">${personaTasks().length} tasks${P().guest?"":" for your role"}</span></div>
    <input class="tsearch" id="taskSearchInput" type="text" placeholder="Search all One.IU tasks (e.g., transcript, parking, W-2)…"
      value="${esc(state.q).replace(/"/g,"&quot;")}" oninput="onTaskSearch(this.value)">
    <div class="chips" id="taskChips">${cats.map(c=>`
      <button class="chip ${state.cat===c?"active":""}" onclick="setCat('${c}')">${c}</button>`).join("")}</div>
    <div id="taskResults">${taskResultsHTML()}</div>
  </div>`;
}
function taskResultsHTML(){
  const q = state.q.trim().toLowerCase();
  let list, note = "";
  if(q){
    list = TASKS.filter(t => (t.name+" "+t.desc+" "+t.cat).toLowerCase().includes(q));
    note = `<div class="launch-divider">Search results across all of One.IU</div>`;
  } else {
    list = personaTasks();
    if(state.cat!=="All") list = list.filter(t=>t.cat===state.cat);
  }
  if(!list.length) return `<div class="empty">No tasks match "${esc(state.q)}".</div>`;
  return note + list.map(t=>`
    <div class="li" style="cursor:pointer" onclick="launchTask('${t.id}')">
      <div class="lic">${t.icon}</div>
      <div style="min-width:0"><div class="lit">${esc(t.name)}</div><div class="lis">${esc(t.desc)}</div></div>
      <div class="lir" style="display:flex;align-items:center;gap:8px">
        <span class="cat-tag">${esc(t.cat)}</span>
        ${P().guest?"":`<button class="star ${state.favs.has(t.id)?"on":""}" title="Favorite"
          onclick="toggleFav(event,'${t.id}')">${state.favs.has(t.id)?"★":"☆"}</button>`}
      </div>
    </div>`).join("");
}
function onTaskSearch(v){ state.q = v; refreshTaskResults(); }
function setCat(c){ state.cat = c; state.q=""; const i=$("taskSearchInput"); if(i) i.value="";
  refreshTaskResults();
  document.querySelectorAll("#taskChips .chip").forEach(ch=>ch.classList.toggle("active",ch.textContent===c));
}
function refreshTaskResults(){ const r=$("taskResults"); if(r) r.innerHTML = taskResultsHTML(); }

/* ---------- campus map ---------- */
function renderCampusMap(){
  const chips=[["buildings","🏛️ Buildings"],["buses","🚌 Buses"],["parking","🅿️ Parking"],["food","🍽️ Food"]];
  return `<div class="map-wrap">
    <div class="map-topbar">
      <input class="msearch" id="mapSearch" type="text" placeholder="Search IUB places…"
        value="${esc(state.mapQ).replace(/"/g,"&quot;")}" oninput="onMapSearch(this.value)">
      <button class="campus-pill" onclick="toast('Campus switching is not connected in this prototype.')">IUB ▾</button>
    </div>
    <div class="map-chips" id="mapChips">${chips.map(([k,l])=>`
      <button class="mchip ${state.mapFilter===k?"active":""}" data-f="${k}" onclick="setMapFilter('${k}')">${l}</button>`).join("")}</div>
    <div id="leafletMap" class="map-box"></div>
    <div class="map-note">📍 ${USER_LOC.label} — distances and availability are simulated.</div>
    <div class="card" style="margin-top:14px">
      <div class="card-head"><h3 id="placeListTitle">${placeListTitle()}</h3>
        <span class="link" style="cursor:default;color:var(--muted)">Sorted by distance</span></div>
      <div id="placeList">${placeListHTML()}</div>
    </div>
  </div>`;
}
function placeListTitle(){
  if(state.mapQ.trim()) return "Search results";
  return {buildings:"Buildings",buses:"Bus stops",parking:"Parking",food:"Food"}[state.mapFilter];
}
function placeSub(p){
  if(p.type==="building"){
    const feats=[];
    if(p.food&&p.food.length) feats.push("🍽️"); if(p.accessible&&p.accessible.length) feats.push("♿");
    if(p.printers) feats.push("🖨️");
    return `${esc(p.addr)}${feats.length?" · "+feats.join(" "):""}`;
  }
  if(p.type==="parking") return `${esc(p.rate)} · ${esc(p.spots)}`;
  if(p.type==="bus") return `Next: ${esc(p.routes[0].r)} in ${p.routes[0].mins} min`;
  if(p.type==="food") return esc(p.addr||p.services||"");
  return "";
}
function placeListHTML(){
  const list = visiblePlaces();
  if(!list.length) return `<div class="empty">No places match "${esc(state.mapQ)}".</div>`;
  return list.map(p=>`
    <div class="li" style="cursor:pointer" onclick="openPlace('${p.id}')">
      <div class="pdot ${p.type}">${TYPE_ICONS[p.type]}</div>
      <div style="min-width:0">
        <div class="lis" style="margin:0 0 2px">${distLabel(p)}</div>
        <div class="lit">${esc(p.name)}</div>
        <div class="lis">${placeSub(p)}</div>
      </div>
      <div class="lir">${p.type==="food"?openBadge(p):(p.abbr?`<span class="cat-tag">${esc(p.abbr)}</span>`:"")}</div>
    </div>`).join("");
}
function onMapSearch(v){ state.mapQ=v; refreshCampusUI(); }
function setMapFilter(f){
  state.mapFilter=f; state.mapQ="";
  const i=$("mapSearch"); if(i) i.value="";
  refreshCampusUI();
}
function refreshCampusUI(){
  const l=$("placeList"); if(l) l.innerHTML=placeListHTML();
  const t=$("placeListTitle"); if(t) t.innerHTML=placeListTitle();
  document.querySelectorAll("#mapChips .mchip").forEach(ch=>
    ch.classList.toggle("active", ch.dataset && ch.dataset.f===state.mapFilter));
  updateMapMarkers();
}
function setupCampusMap(){
  const el=document.getElementById("leafletMap");
  if(!el) return;
  if(window._campusMap){ try{window._campusMap.remove();}catch(e){} window._campusMap=null; }
  if(typeof L==="undefined"){
    el.innerHTML='<div class="empty" style="padding-top:130px">🗺️ Map tiles unavailable (offline). The place list below still works.</div>';
    return;
  }
  const map=L.map(el,{scrollWheelZoom:false}).setView([39.1700,-86.5195],15);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
    {maxZoom:19, attribution:"&copy; OpenStreetMap &copy; CARTO"}).addTo(map);
  window._campusMap=map;
  L.circleMarker([USER_LOC.lat,USER_LOC.lng],{radius:8,color:"#fff",weight:3,fillColor:"#2b6cb0",fillOpacity:1})
    .addTo(map).bindTooltip("You (simulated)");
  window._markerLayer=L.layerGroup().addTo(map);
  updateMapMarkers();
}
function updateMapMarkers(){
  if(!window._campusMap || !window._markerLayer) return;
  window._markerLayer.clearLayers();
  for(const p of visiblePlaces()){
    L.circleMarker([p.lat,p.lng],{radius:9,color:"#fff",weight:2.5,fillColor:MARKER_COLORS[p.type],fillOpacity:.95})
      .on("click",()=>openPlace(p.id)).bindTooltip(p.name).addTo(window._markerLayer);
  }
}
function gmapsLink(p){ return `https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`; }
function openPlace(id){
  const p = allMapPlaces().find(x=>x.id===id);
  if(!p) return;
  if(window._campusMap) window._campusMap.panTo([p.lat,p.lng]);
  let html = `
    <button class="close" onclick="closeDrawer()">✕</button>
    <div class="dhead-dist">${distLabel(p)}</div>
    ${p.abbr?`<span class="abbr-chip">${esc(p.abbr)}</span>`:""}
    <h2>${esc(p.name)}</h2>
    ${p.addr?`<div class="dhead-addr">${esc(p.addr).toUpperCase()}</div>`:""}
    <a class="getthere" href="${gmapsLink(p)}" target="_blank" rel="noopener">➔ Getting there</a>`;
  if(p.type==="building"){
    if(p.accessible && p.accessible.length) html += `
      <div class="dsec"><h4>♿ Accessible entrances</h4>
        ${p.accessible.map(a=>`<div class="drow">${esc(a)}</div>`).join("")}</div>`;
    if(p.printers) html += `
      <div class="dsec"><h4>🖨️ Printers</h4>
        <div class="drow">PawPrints stations <span class="right cat-tag">${p.printers} locations</span></div></div>`;
    if(p.food && p.food.length) html += `
      <div class="dsec"><h4>🍽️ Food</h4>
        ${p.food.map(f=>`<div class="drow"><div>${esc(f.name)}
          <div class="sub">${esc(f.floor)} · ${hr12(f.hours[0])}–${hr12(f.hours[1])} ${esc(f.days)} · ${esc(f.services)}</div></div>
          <span class="right">${openBadge(f)}</span></div>`).join("")}</div>`;

/* =====================================================
   Action Items widget (aggregated, source-attributed)
   Completion is source-owned — opening a link only STARTS a task.
   aiProgress[persona][id] ∈ {"started","resolved"} (absent = not started)
===================================================== */
function aiItems(){ return P().actionItems || []; }
function aiProg(id){ return state.aiProgress[state.persona][id]; }
function aiResolved(id){ return aiProg(id)==="resolved"; }
function aiStarted(id){ return aiProg(id)==="started"; }
function aiLive(){ const d=state.aiDismissed[state.persona]; return aiItems().filter(it=>!d.has(it.id)); }
function aiFiltered(){
  let l=aiLive(); const f=state.ai.filter;
  if(f==="urgent")    l=l.filter(i=>i.high);
  if(f==="progress")  l=l.filter(i=>aiStarted(i.id));
  if(f==="reminders") l=l.filter(i=>i.src==="reminder");
  return l;
}
function aiActiveCount(){ return aiLive().filter(i=>!aiResolved(i.id)).length; }

function renderActionItems(){
  return `<div class="card"><div id="aiRoot">${aiInner()}</div></div>`;
}
function aiInner(){
  const list = aiFiltered().sort((a,b)=>{
    const ar=aiResolved(a.id)?1:0, br=aiResolved(b.id)?1:0;
    if(ar!==br) return ar-br;
    return (b.high?1:0)-(a.high?1:0);
  });
  const dismissedCount = state.aiDismissed[state.persona].size;
  return `
    <div class="ai-head"><span class="w-title">Action Items</span><span class="count-badge">${aiActiveCount()}</span>
      <button class="ai-add" onclick="aiToggleCompose()">${state.ai.compose?"✕ Cancel":"＋ Reminder"}</button></div>
    <div class="ai-sub">Actions from across IU. A link starts a task; its source marks it done.</div>
    ${state.ai.compose?`<div class="ai-compose">
      <input id="aiRemTitle" class="ai-rem-input" type="text" placeholder="Add a personal reminder…" autocomplete="off"
        onkeydown="if(event.key==='Enter')aiAddReminder(); if(event.key==='Escape')aiToggleCompose()">
      <input id="aiRemDue" class="ai-rem-input" type="text" placeholder="When? (optional — e.g. Friday)" autocomplete="off"
        onkeydown="if(event.key==='Enter')aiAddReminder()">
      <button class="act" onclick="aiAddReminder()">Add reminder</button>
    </div>`:""}
    <button class="explainer-toggle" onclick="aiToggleExplain()">${state.ai.explain?"▾":"▸"} How “done” works</button>
    <div class="explainer ${state.ai.explain?"open":""}">
      <div class="model-row"><span class="model-key">🔗</span><div><b>System-confirmed</b> (default). Clears when the source reports it — Canvas, Bursar, Registrar. Starting isn't finishing.</div></div>
      <div class="model-row"><span class="model-key">🖊️</span><div><b>Needs approval.</b> You act, then someone else signs off. Shows as awaiting them.</div></div>
      <div class="model-row"><span class="model-key">🙋</span><div><b>Self-reported.</b> Email, reminders — nothing verifies these. “Mark done” only clears your list.</div></div>
      <div style="margin-top:9px"><b>Dismiss</b> just hides an item — use it if you've handled something the feed hasn't caught up on. It never notifies the source.</div>
    </div>
    <div class="ai-chips">${aiChip("all","All")}${aiChip("urgent","Urgent")}${aiChip("progress","In progress")}${aiChip("reminders","My reminders")}</div>
    <div class="ai-items">${ list.length ? `<div class="ai-grid">${list.map(aiRenderItem).join("")}</div>` : aiEmpty() }</div>
    <div class="ai-foot">
      ${dismissedCount ? `<span class="restore" onclick="aiRestoreAll()">↺ Restore ${dismissedCount} dismissed</span>` : `<span>Nothing dismissed</span>`}
      <span class="sync">🔄 Synced just now</span>
    </div>`;
}
function aiChip(key,label){ return `<button class="chip ${state.ai.filter===key?"active":""}" onclick="aiSetFilter('${key}')">${label}</button>`; }
function aiRefresh(){ const r=$("aiRoot"); if(r) r.innerHTML = aiInner(); }

function aiRenderItem(it){
  const S=SOURCES[it.src], resolved=aiResolved(it.id), started=aiStarted(it.id);
  return `
    <div class="item ${it.high&&!resolved?"high":""} ${resolved?"resolved":""}">
      <div class="it-top">
        <span class="src-chip ${S.cls}"><span class="src-ic">${S.icon}</span>${esc(S.name)}</span>
        ${aiModelTag(it)}
        <span class="due ${it.high?"high":""}">${esc(it.due)}</span>
      </div>
      <div class="it-title">${esc(it.title)}</div>
      <div class="it-desc">${esc(it.desc)}</div>
      ${aiStatus(it)}
      <div class="it-actions">${aiActions(it)}</div>
      ${started?aiSim(it):""}
    </div>`;
}
function aiModelTag(it){
  if(it.confirm==="approval") return `<span class="model approve" title="You act, then ${esc(it.approver)} signs off.">🖊️ Needs approval</span>`;
  if(it.confirm==="self")     return `<span class="model self" title="Nothing verifies this — Mark done only clears your list.">🙋 Self-reported</span>`;
  return "";
}
function aiStatus(it){
  const short=SOURCES[it.src].name.split(" (")[0].split(" · ")[0];
  if(aiResolved(it.id)){
    if(it.confirm==="self")     return aiStrip("self","✓","Done · self-reported");
    if(it.confirm==="approval") return aiStrip("doneS","✓",`Approved by ${esc(it.approver)}`);
    return aiStrip("doneS","✓",`Confirmed by ${esc(short)}`);
  }
  if(aiStarted(it.id)){
    if(it.confirm==="approval") return aiStrip("approve","🖊️",`Your part done · awaiting ${esc(it.approver)}`);
    return aiStrip("wait","⏳",`In progress · awaiting ${esc(short)}`,it.confirmedBy);
  }
  return "";
}
function aiStrip(cls,icon,txt,tip){ return `<div class="status ${cls}"${tip?` title="Clears when ${esc(tip)}"`:""}><span class="si">${icon}</span><span>${txt}</span></div>`; }
function aiActions(it){
  const resolved=aiResolved(it.id), started=aiStarted(it.id);
  let out="";
  if(resolved){
    out += `<button class="act ghost" onclick="aiReopen('${it.id}')">↺ ${it.confirm==="self"?"Undo":"Reopen"}</button>`;
  } else {
    if(it.action) out += `<button class="act" onclick="aiDoAction('${it.id}')">${started&&it.confirm!=="self"?"↗ Continue":"↗ "+esc(it.action.label)}</button>`;
    if(it.confirm==="self") out += `<button class="act ghost" onclick="aiMarkDone('${it.id}')">✓ Mark done</button>`;
  }
  out += `<button class="dismiss" title="Hide it — doesn't mark complete or notify the source" onclick="aiDismiss('${it.id}')">✕ Dismiss</button>`;
  return out;
}
function aiSim(it){ return `<button class="sim" onclick="aiSimulate('${it.id}')">🛠️ Simulate ${it.confirm==="approval"?"approval":"source confirmation"}</button>`; }
function aiEmpty(){
  if(state.ai.filter==="progress")  return `<div class="empty">Nothing in progress right now.</div>`;
  if(state.ai.filter!=="all")       return `<div class="empty">No ${state.ai.filter==="urgent"?"urgent":"reminder"} items right now.</div>`;
  return `<div class="empty">You're all caught up. New actions appear as their source systems request them.</div>`;
}
function aiSetFilter(f){ state.ai.filter=f; aiRefresh(); }
function aiToggleExplain(){ state.ai.explain=!state.ai.explain; aiRefresh(); }
function aiToggleCompose(){
  state.ai.compose=!state.ai.compose; aiRefresh();
  if(state.ai.compose) setTimeout(()=>{ const i=$("aiRemTitle"); if(i) i.focus(); },40);
}
function aiAddReminder(){
  const ti=$("aiRemTitle"), di=$("aiRemDue");
  const title=((ti&&ti.value)||"").trim();
  if(!title){ toast("Type a reminder first."); if(ti) ti.focus(); return; }
  const due=((di&&di.value)||"").trim()||"No date";
  P().actionItems.unshift({id:"rem_"+Date.now(),src:"reminder",title,desc:"You added this reminder.",due,confirm:"self"});
  state.ai.compose=false;
  if(state.ai.filter!=="all" && state.ai.filter!=="reminders") state.ai.filter="all";
  aiRefresh();
  toast("Reminder added.");
}
function aiDoAction(id){
  const it=aiItems().find(x=>x.id===id);
  if(!it || !it.action) return;
  if(it.confirm!=="self" && !aiResolved(id)) state.aiProgress[state.persona][id]="started";
  aiRefresh();
  toast(`Prototype: opens ${it.action.target}.`);
}
function aiMarkDone(id){ state.aiProgress[state.persona][id]="resolved"; aiRefresh(); toast("Marked done · self-reported."); }
function aiSimulate(id){
  const it=aiItems().find(x=>x.id===id);
  state.aiProgress[state.persona][id]="resolved"; aiRefresh();
  toast(it.confirm==="approval" ? `${it.approver} approved it.` : `${SOURCES[it.src].name.split(" (")[0]} confirmed it.`);
}
function aiReopen(id){ delete state.aiProgress[state.persona][id]; aiRefresh(); }
function aiDismiss(id){
  const it=aiItems().find(x=>x.id===id);
  state.aiDismissed[state.persona].add(id); aiRefresh();
  toast(it.src==="reminder" ? "Removed." : "Dismissed · not marked complete.");
}
function aiRestoreAll(){ state.aiDismissed[state.persona].clear(); aiRefresh(); toast("Restored dismissed items."); }

function teamLogo(logo){

/* =====================================================
   Omni-search widget — searches One.IU tasks, this user's
   personalized portal content, and general campus content.
   Fixed-width column; results scroll inside a fixed-height panel.
===================================================== */
function buildSearchIndex(){
  const idx=[], seen=new Set();
  const add=o=>{ const k=o.group+"|"+o.title.toLowerCase(); if(seen.has(k))return; seen.add(k); idx.push(o); };
  const p=P();
  // personalized content across this user's tabs
  p.tabs.forEach(tab=>{
    const nav=`omniGo('${tab.id}')`, g="Your "+tab.label;
    (p.views[tab.id]||[]).forEach(w=>{
      if(w.type==="schedule") w.items.forEach(i=>add({icon:"📅",title:i.title,sub:i.loc,tag:tab.label,group:g,run:nav}));
      if(w.type==="list")     w.items.forEach(i=>add({icon:i.icon||"•",title:i.title,sub:i.sub,tag:tab.label,group:g,run:nav}));
      if(w.type==="tasks")    w.items.forEach(i=>add({icon:"✅",title:i.txt,sub:i.due,tag:tab.label,group:g,run:nav}));
      if(w.type==="steps")    w.items.forEach(i=>add({icon:"◉",title:i.title,sub:i.sub,tag:tab.label,group:g,run:nav}));
      if(w.type==="balances") w.items.forEach(i=>add({icon:i.icon,title:i.label,sub:i.value,tag:tab.label,group:g,run:nav}));
    });
  });
  // this user's action items
  (p.actionItems||[]).forEach(i=>add({icon:SOURCES[i.src].icon,title:i.title,sub:i.desc,
    tag:SOURCES[i.src].name.split(" (")[0].split(" · ")[0],group:"Your action items",run:`omniGo('home')`}));
  // One.IU tasks (general services + role-specific)
  TASKS.forEach(t=>add({icon:t.icon,title:t.name,sub:t.desc,tag:t.cat,group:"One.IU tasks",run:`launchTask('${t.id}')`}));
  // general campus content — buildings, parking, buses, food
  allMapPlaces().forEach(pl=>add({icon:TYPE_ICONS[pl.type],title:pl.name,sub:pl.addr||placeSub(pl),
    tag:pl.type,group:"Places & campus",run:`openPlace('${pl.id}')`}));
  return idx;
}
function renderOmnibar(){
  const has = !!state.omniQ.trim();
  return `<div class="omnibar">
    <span class="omnibar-ic">🔍</span>
    <input class="omnibar-input" id="omniInput" type="text" placeholder="Search all of IU"
      value="${esc(state.omniQ).replace(/"/g,"&quot;")}" autocomplete="off"
      oninput="onOmniSearch(this.value)" onkeydown="if(event.key==='Escape')omniClear()">
    <button class="omnibar-clear" id="omniClear" onclick="omniClear()" style="${has?'':'display:none'}">✕</button>
    <div class="omnibar-results" id="omniResults" style="${has?'':'display:none'}">${omniResultsHTML()}</div>
  </div>`;
}
function omniResultsHTML(){
  const q=state.omniQ.trim().toLowerCase();
  if(!q) return `<div class="omni-empty">Start typing to search across your schedule, to-dos and balances, every One.IU service, and campus buildings.</div>`;
  const hits=buildSearchIndex().filter(e=>(e.title+" "+(e.sub||"")+" "+e.tag+" "+e.group).toLowerCase().includes(q));
  if(!hits.length) return `<div class="omni-empty">No matches for “${esc(state.omniQ)}”.</div>`;
  const rank=g=>g.startsWith("Your")?0:g==="One.IU tasks"?1:2;
  const groups=[...new Set(hits.map(h=>h.group))].sort((a,b)=>rank(a)-rank(b)||a.localeCompare(b));
  let out="", total=0;
  for(const g of groups){
    const rows=hits.filter(h=>h.group===g).slice(0,6);
    if(!rows.length || total>=24) continue;
    out += `<div class="omni-group">${esc(g)}</div>` + rows.map(r=>`
      <div class="ores" onclick="${r.run}">
        <div class="oic">${r.icon}</div>
        <div style="min-width:0"><div class="ot">${esc(r.title)}</div><div class="os">${esc(r.sub||"")}</div></div>
        <span class="otag">${esc(r.tag)}</span>
      </div>`).join("");
    total += rows.length;
  }
  return out;
}
function onOmniSearch(v){
  state.omniQ=v;
  const has=!!v.trim();
  const r=$("omniResults"); if(r){ r.innerHTML=omniResultsHTML(); r.style.display=has?"block":"none"; }
  const c=$("omniClear"); if(c) c.style.display=has?"flex":"none";
}
function omniClear(){ state.omniQ=""; const i=$("omniInput"); if(i){ i.value=""; i.focus(); } onOmniSearch(""); }
function omniGo(tab){ state.omniQ=""; setTab(tab); }

/* =====================================================
   Customizable widget layout
   Layouts are stored per persona + tab as
   {order:[defIndices], removed:[defIndices]} and persisted.
===================================================== */
let layouts = {};
(function loadLayouts(){
  try{ const s = localStorage.getItem("oneiu_layouts"); if(s) layouts = JSON.parse(s)||{}; }catch(e){}
})();
function saveLayouts(){
  try{ localStorage.setItem("oneiu_layouts", JSON.stringify(layouts)); }catch(e){}
}
/* Tokens are strings: "0","1"… index a persona's default defs;
   "cat:orgs" is a catalog widget added by the user. */
function getLayout(){
  const p=state.persona, t=state.tab;
  const defs=DATA[p].views[t]||[]; const n=defs.length;
  const all=[...Array(n).keys()].map(String);
  layouts[p]=layouts[p]||{};
  let lay=layouts[p][t];
  if(!lay || !Array.isArray(lay.order) || !Array.isArray(lay.removed)){
    lay={order:[...all],removed:[]};
  } else {
    lay.order  = lay.order.map(String).filter(tok=> tok.startsWith("cat:") || all.includes(tok));
    lay.removed= lay.removed.map(String).filter(tok=> all.includes(tok));
    all.forEach(i=>{ if(!lay.order.includes(i) && !lay.removed.includes(i)) lay.order.push(i); });
    lay.order=[...new Set(lay.order)];
  }
  layouts[p][t]=lay; return lay;
}
function tokenDef(tok){
  return tok.startsWith("cat:") ? {type:tok.slice(4)} : (DATA[state.persona].views[state.tab]||[])[Number(tok)];
}
function visibleTokens(){ const lay=getLayout(); return lay.order.filter(tok=> tok.startsWith("cat:") || !lay.removed.includes(tok)); }
function visibleTypes(){ return visibleTokens().map(tokenDef).filter(Boolean).map(d=>d.type); }

/* Every widget a user can add, regardless of their default screen. */
const WIDGET_CATALOG = [
  {type:"actionitems",label:"✅ Action Items",     desc:"Tasks that need you, from across IU"},
  {type:"campusfeed", label:"📰 Campus feed",       desc:"Athletics, events & news across IU"},
  {type:"crimsoncard",label:"💳 CrimsonCard",       desc:"Your card, balances & photo"},
  {type:"orgs",       label:"🧑‍🤝‍🧑 Student Organizations", desc:"Memberships, announcements & events"},
  {type:"libraries",  label:"📚 Libraries",          desc:"Loans, ILL, study rooms & catalog"},
  {type:"campusmap",  label:"🗺️ Campus map",         desc:"Search buildings, buses, parking & food"},
  {type:"tasklauncher",label:"⊞ One.IU tasks",      desc:"Search & launch any task"},
  {type:"launch",     label:"⭐ Favorite tasks",      desc:"Your pinned & popular tasks"},
];
const FULL_WIDTH_TYPES = ["hero","launch","tasklauncher","campusmap","signin"];
const WIDE_TYPES = ["actionitems","campusfeed"];   // max 2 columns wide
function widgetLabel(def){
  if(def.type==="signin") return "🔐 Sign in";
  if(def.type==="actionitems") return "✅ Action Items";
  if(def.type==="crimsoncard") return "💳 CrimsonCard";
  if(def.type==="orgs") return "🧑‍🤝‍🧑 Student Organizations";
  if(def.type==="libraries") return "📚 Libraries";
  if(def.type==="campusfeed") return "📰 Campus feed";
  if(def.type==="hero") return "📣 Highlights banner";
  if(def.type==="launch") return "⭐ Favorite tasks";
  if(def.type==="tasklauncher") return "⊞ One.IU tasks";
  if(def.type==="campusmap") return "🗺️ Campus map";
  return def.title || def.type;
}
function widgetWrap(tok,def){
  const span = FULL_WIDTH_TYPES.includes(def.type) ? "full"
             : WIDE_TYPES.includes(def.type) ? "wide" : "";
  const sel = state.moving===tok;
  return `<div class="widget ${span} ${sel?"selected":""}" data-tok="${tok}" draggable="false"
      ondragstart="wDragStart(event,this)" ondragend="wDragEnd(event,this)"
      ondragover="wDragOver(event,this)" ondragleave="this.classList.remove('drop-target')"
      ondrop="wDrop(event,this)">
    <div class="w-controls">
      <button class="w-grab" title="Drag to rearrange (or tap, then tap a destination)"
        onmousedown="armDrag(this)" onclick="grabClick(event,'${tok}')">⠿</button>
      <button class="w-x" title="Remove widget" onclick="removeWidget(event,'${tok}')">✕</button>
    </div>
    ${renderCard(def)}
  </div>`;
}
/* drag & drop (grabber-armed) */
function armDrag(btn){
  const w=btn.closest(".widget"); if(!w) return;
  w.setAttribute("draggable","true");
  const off=()=>{ w.setAttribute("draggable","false"); document.removeEventListener("mouseup",off); };
  document.addEventListener("mouseup",off);
}
function wDragStart(e,el){
  window._dragTok = el.dataset.tok;
  el.classList.add("dragging");
  if(e.dataTransfer){ e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain","widget");}catch(_){} }
}
function wDragEnd(e,el){
  el.classList.remove("dragging");
  document.querySelectorAll(".widget.drop-target").forEach(x=>x.classList.remove("drop-target"));
  window._dragTok = null;
}
function wDragOver(e,el){
  if(window._dragTok==null || el.dataset.tok===window._dragTok) return;
  e.preventDefault();
  if(e.dataTransfer) e.dataTransfer.dropEffect="move";
  el.classList.add("drop-target");
}
function wDrop(e,el){
  e.preventDefault(); el.classList.remove("drop-target");
  const from=window._dragTok, to=el.dataset.tok;
  window._dragTok=null;
  if(from==null || from===to) return;
  const r=el.getBoundingClientRect();
  moveWidget(from, to, (e.clientY - r.top) < r.height/2);
}
/* tap-to-move fallback (touch / no drag) */
function grabClick(ev,tok){
  ev.stopPropagation();
  if(state.moving==null){
    state.moving=tok; renderMain();
    toast("Widget selected — tap the grabber where it should move to.");
  } else if(state.moving===tok){
    state.moving=null; renderMain();
  } else {
    const from=state.moving; state.moving=null;
    moveWidget(from,tok,true);
  }
}
function moveWidget(from,to,before=true){
  const lay=getLayout();
  const o=lay.order.filter(x=>x!==from);
  let idx=o.indexOf(to); if(idx<0) idx=o.length; else if(!before) idx++;
  o.splice(idx,0,from);
  lay.order=o; saveLayouts(); renderMain();
}
function removeWidget(ev,tok){
  ev.stopPropagation();
  const lay=getLayout();
  if(tok.startsWith("cat:")) lay.order=lay.order.filter(x=>x!==tok);
  else if(!lay.removed.includes(tok)) lay.removed.push(tok);
  if(state.moving===tok) state.moving=null;
  saveLayouts(); renderMain();
  toast("Widget removed. Add it back from “＋ Add widgets”.");
}
function restoreWidget(tok){
  const lay=getLayout();
  lay.removed=lay.removed.filter(x=>x!==tok);
  saveLayouts(); renderMain(); openWidgetPicker();
}
/* Add any catalog widget — even one not in this persona's defaults. */
function addCatalogWidget(type){
  const lay=getLayout();
  if(visibleTypes().includes(type)){ toast("That widget is already on this screen."); return; }
  const defs=DATA[state.persona].views[state.tab]||[];
  const removedSame=lay.removed.find(tok=>{ const d=defs[Number(tok)]; return d && d.type===type; });
  if(removedSame!==undefined) lay.removed=lay.removed.filter(x=>x!==removedSame); // restore in place
  else lay.order.push("cat:"+type);
  saveLayouts(); renderMain(); openWidgetPicker();
  toast("Widget added to this screen.");
}
function resetLayout(){
  const p=state.persona, t=state.tab;
  if(layouts[p]) delete layouts[p][t];
  state.moving=null;
  saveLayouts(); renderMain();
  toast("Screen restored to the default layout.");
}
function openWidgetPicker(){
  const defs=P().views[state.tab]||[];
  const lay=getLayout();
  const vis=visibleTypes();
  const catRows = WIDGET_CATALOG.map(w=>`
    <div class="wp-row">
      <div style="flex:1;min-width:0"><div class="wpn">${w.label}</div><div class="lis">${w.desc}</div></div>
      ${vis.includes(w.type)
        ? `<span class="badge gray">On screen</span>`
        : `<button class="wp-add" onclick="addCatalogWidget('${w.type}')">＋ Add</button>`}
    </div>`).join("");
  const removedCtx = lay.removed.filter(tok=>{ const d=defs[Number(tok)]; return d && !WIDGET_CATALOG.some(w=>w.type===d.type); });
  const ctxRows = removedCtx.map(tok=>`
    <div class="wp-row"><div class="wpn">${widgetLabel(defs[Number(tok)])}</div>
      <button class="wp-add" onclick="restoreWidget('${tok}')">＋ Add</button></div>`).join("");
  $("drawer").innerHTML = `
    <button class="close" onclick="closeDrawer()">✕</button>
    <h2>＋ Add widgets</h2>
    <p class="dsub">Add any widget to this screen — even ones not shown by default.</p>
    <div class="dsec"><h4>🧩 Widget library</h4>${catRows}</div>
    ${ctxRows ? `<div class="dsec"><h4>↩︎ Removed from this screen</h4>${ctxRows}</div>` : ""}
    <div class="dsec"><h4>↺ Start over</h4>
      <button class="lbtn" onclick="resetLayout();closeDrawer()">Reset this screen to default</button></div>`;
  $("drawer").classList.add("open"); $("scrim").classList.add("open");
}
