function render(){ renderSidebar(); renderBottomNav(); renderMain(); }

/* ---------- interactions ---------- */
function setTab(id){ state.tab=id; state.q=""; state.cat="All"; state.moving=null; state.omniQ=""; render(); window.scrollTo({top:0}); }
function goToTaskSearch(){
  setTab("tasks");
  setTimeout(()=>{ const i=$("taskSearchInput"); if(i) i.focus(); },50);
}
function setPersona(key){
  state.persona=key; state.tab="home"; state.checked={}; state.q=""; state.cat="All"; state.moving=null;
  state.favs = new Set(DATA[key].favorites);
  state.ai = { filter:"all", explain:false };
  state.omniQ = "";
  toggleAdmin(false); closeDrawer(); render(); window.scrollTo({top:0});
  toast(`Now viewing as ${DATA[key].name} — ${DATA[key].role}`);
}
function toggleTask(id){ state.checked[id]=!state.checked[id]; renderMain(); }

function toggleAdmin(open){
  $("adminModal").classList.toggle("open",open);
  if(open){
    $("personaGrid").innerHTML = Object.entries(DATA).map(([k,p])=>`
      <button class="pcard ${state.persona===k?"sel":""}" onclick="setPersona('${k}')">
        <div class="pav">${p.avatar}</div>
        <div class="pr">${p.role}</div>
        <div class="pn">${p.name}</div>
        <div class="pd">${p.adminDesc}</div>
        <div class="sel-tag">✓ Currently viewing</div>
      </button>`).join("");
  }
}
function openNotifs(){
  const p = P();
  $("drawer").innerHTML = `
    <button class="close" onclick="closeDrawer()">✕</button>
    <h2>🔔 Notifications</h2>
    <p class="dsub">${p.notifCount} unread</p>
    ${p.notifications.map(n=>`
      <div class="notif ${n.unread?"unread":""}">
        <div class="nic">${n.icon}</div>
        <div><div class="nt">${esc(n.title)}</div><div class="ns">${esc(n.sub)}</div><div class="ntime">${esc(n.time)}</div></div>
      </div>`).join("")}`;
  $("drawer").classList.add("open"); $("scrim").classList.add("open");
}
function closeDrawer(){
  $("drawer").classList.remove("open"); $("scrim").classList.remove("open");
}

/* ---------- Profile & settings ---------- */
function applyPrefs(){
  document.body.classList.toggle("dark", state.theme==="dark");
  document.body.classList.toggle("reduce-motion", !!state.settings.reduceMotion);
}
function savePrefs(){
  try{ localStorage.setItem("oneiu_theme",state.theme);
       localStorage.setItem("oneiu_settings",JSON.stringify(state.settings)); }catch(e){}
}
function toggleTheme(){ state.theme = state.theme==="dark"?"light":"dark"; savePrefs(); applyPrefs(); openSettings(); }
function toggleSetting(k){ state.settings[k]=!state.settings[k]; savePrefs(); applyPrefs(); openSettings(); }
function signOut(){ closeDrawer(); setPersona("guest"); }
function sw(on,handler){ return `<button class="switch ${on?"on":""}" onclick="${handler}"></button>`; }
function setRow(icon,title,sub,right){
  return `<div class="set-row"><div class="si">${icon}</div>
    <div style="min-width:0"><div class="st">${title}</div><div class="ss">${sub}</div></div>
    <div class="set-right">${right}</div></div>`;
}
function openSettings(){
  const p=P(), dark=state.theme==="dark";
  $("drawer").innerHTML = `
    <button class="close" onclick="closeDrawer()">✕</button>
    <h2>Profile &amp; settings</h2>
    <div class="set-profile">
      <div class="set-av">${p.avatar}</div>
      <div style="min-width:0"><div class="set-name">${p.guest?"Not signed in":esc(p.name)}</div>
        <div class="set-role">${esc(p.role)}</div></div>
    </div>
    <div class="dsec"><h4>Account</h4>
      ${p.guest
        ? `<button class="act" style="width:100%;justify-content:center" onclick="toast('Prototype: opens IU Login (CAS + two-step / Duo).')">Sign in with your IU username</button>`
        : `<button class="act ghost" style="width:100%;justify-content:center" onclick="signOut()">↩︎ Sign out</button>`}
    </div>
    <div class="dsec"><h4>Appearance</h4>
      ${setRow(dark?"🌙":"☀️","Dark mode",(dark?"On":"Off")+" · easier on the eyes at night",sw(dark,"toggleTheme()"))}
    </div>
    <div class="dsec"><h4>Notifications</h4>
      ${setRow("🔔","Push notifications","Deadlines, holds & campus alerts",sw(state.settings.notifs,"toggleSetting('notifs')"))}
      ${setRow("✉️","Weekly email digest","A summary of your Action Items",sw(state.settings.digest,"toggleSetting('digest')"))}
    </div>
    <div class="dsec"><h4>Accessibility</h4>
      ${setRow("🎬","Reduce motion","Minimize animations and transitions",sw(state.settings.reduceMotion,"toggleSetting('reduceMotion')"))}
    </div>
    <div class="dsec"><h4>General</h4>
      <div class="set-row" style="cursor:pointer" onclick="toast('Prototype: language settings.')">${'<div class="si">🌐</div><div style="min-width:0"><div class="st">Language</div><div class="ss">English (US)</div></div><div class="set-right">›</div>'}</div>
      <div class="set-row" style="cursor:pointer" onclick="toast('Prototype: privacy & data sharing.')">${'<div class="si">🔒</div><div style="min-width:0"><div class="st">Privacy &amp; data sharing</div><div class="ss">Manage what you share</div></div><div class="set-right">›</div>'}</div>
      <div class="set-row" style="cursor:pointer" onclick="toggleAdmin(true)">${'<div class="si">🛠️</div><div style="min-width:0"><div class="st">Switch persona (demo)</div><div class="ss">Preview One.IU as another member</div></div><div class="set-right">›</div>'}</div>
    </div>
    <div class="cc-hint" style="margin-top:8px">One.IU prototype · v0.9</div>`;
  $("drawer").classList.add("open"); $("scrim").classList.add("open");
}

let toastTimer;
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2600);
}

$("adminModal").addEventListener("click",e=>{ if(e.target.id==="adminModal") toggleAdmin(false); });

applyPrefs();
render();
</script>
</body>
</html>
